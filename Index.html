<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopee PRO MAX</title>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  margin: 0;
  padding: 10px;
}
.container {
  max-width: 420px;
  margin: auto;
  background: white;
  padding: 15px;
  border-radius: 15px;
}
input, button {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  border-radius: 8px;
}
button {
  background: #ee4d2d;
  color: white;
  border: none;
}
.resultado {
  background: #fafafa;
  padding: 10px;
  border-radius: 10px;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

<h2>💰 Shopee PRO MAX</h2>

<h3>📦 Produto</h3>
<input id="custo" placeholder="Custo">
<input id="embalagem" placeholder="Embalagem">
<input id="taxa" placeholder="Taxa (%)">
<input id="taxaFixa" placeholder="Taxa fixa">
<input id="afiliado" placeholder="Afiliado (%)">
<input id="lucro" placeholder="Lucro (%)">

<h3>📦 Kit</h3>
<input id="quantidade" placeholder="Qtd">
<input id="desconto" placeholder="Desconto (%)">

<h3>📊 Produção</h3>
<input id="vendasDia" placeholder="Vendas por dia">
<input id="diasMes" placeholder="Dias no mês">

<button onclick="calcular()">Calcular</button>
<button onclick="salvarPadrao()">💾 Salvar padrão</button>
<button onclick="copiar()">📋 Copiar</button>

<div class="resultado" id="resultado"></div>

<div class="resultado" id="historico"></div>

</div>

<script>

function precoPsicologico(v){
  return Math.floor(v) + 0.99;
}

function calcular(){

let custo = +custoInput.value || 0;
let embalagem = +embalagemInput.value || 0;
let taxa = (+taxaInput.value || 0)/100;
let taxaFixa = +taxaFixaInput.value || 0;
let afiliado = (+afiliadoInput.value || 0)/100;
let lucro = (+lucroInput.value || 0)/100;

let qtd = +quantidadeInput.value || 1;
let desconto = (+descontoInput.value || 0)/100;

let vendasDia = +vendasDiaInput.value || 0;
let diasMes = +diasMesInput.value || 30;

let custoTotal = custo + embalagem;

let precoMin = (custoTotal + taxaFixa) / (1 - taxa - afiliado);
let precoUnit = (custoTotal + taxaFixa) / (1 - taxa - afiliado - lucro);

let precoKit = precoUnit * qtd * (1 - desconto);

let receitaLiquida = precoKit * (1 - taxa - afiliado) - taxaFixa;
let custoKit = custoTotal * qtd;
let lucroReal = receitaLiquida - custoKit;

let lucroDia = lucroReal * vendasDia;
let lucroMes = lucroDia * diasMes;

let texto = `
🔹 UNITÁRIO<br>
Preço: R$ ${precoUnit.toFixed(2)}<br>
Psicológico: R$ ${precoPsicologico(precoUnit).toFixed(2)}<br><br>

⚠️ Preço mínimo: R$ ${precoMin.toFixed(2)}<br><br>

📦 KIT (${qtd})<br>
Preço: R$ ${precoKit.toFixed(2)}<br>
Psicológico: R$ ${precoPsicologico(precoKit).toFixed(2)}<br><br>

🟢 Lucro real kit: R$ ${lucroReal.toFixed(2)}<br><br>

📊 PRODUÇÃO<br>
Dia: R$ ${lucroDia.toFixed(2)}<br>
Mês: R$ ${lucroMes.toFixed(2)}
`;

resultado.innerHTML = texto;

salvarHistorico(texto);
}

function salvarPadrao(){
  localStorage.setItem("dados", JSON.stringify({
    custo: custoInput.value,
    embalagem: embalagemInput.value,
    taxa: taxaInput.value,
    lucro: lucroInput.value
  }));
  alert("Salvo!");
}

function carregar(){
  let d = JSON.parse(localStorage.getItem("dados") || "{}");
  custoInput.value = d.custo || "";
  embalagemInput.value = d.embalagem || "";
  taxaInput.value = d.taxa || "";
  lucroInput.value = d.lucro || "";
}

function salvarHistorico(t){
  let h = JSON.parse(localStorage.getItem("hist")||"[]");
  h.unshift(t);
  localStorage.setItem("hist", JSON.stringify(h.slice(0,5)));
  mostrarHistorico();
}

function mostrarHistorico(){
  let h = JSON.parse(localStorage.getItem("hist")||"[]");
  historico.innerHTML = "<b>Histórico</b><br>" + h.join("<hr>");
}

function copiar(){
  navigator.clipboard.writeText(resultado.innerText);
  alert("Copiado!");
}

// atalhos
const custoInput = document.getElementById("custo");
const embalagemInput = document.getElementById("embalagem");
const taxaInput = document.getElementById("taxa");
const taxaFixaInput = document.getElementById("taxaFixa");
const afiliadoInput = document.getElementById("afiliado");
const lucroInput = document.getElementById("lucro");
const quantidadeInput = document.getElementById("quantidade");
const descontoInput = document.getElementById("desconto");
const vendasDiaInput = document.getElementById("vendasDia");
const diasMesInput = document.getElementById("diasMes");

const resultado = document.getElementById("resultado");
const historico = document.getElementById("historico");

carregar();
mostrarHistorico();

</script>

</body>
</html>
